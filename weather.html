<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .weather-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        input {
            padding: 10px;
            width: 80%;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .info {
            margin-top: 20px;
        }
        #temp {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="weather-card">
    <h2>Weather Update</h2>
    <input type="text" id="cityInput" placeholder="Sohorer naam likhun (e.g. Dhaka)">
    <button onclick="getWeather()">Dekhun</button>

    <div class="info" id="weatherInfo" style="display:none;">
        <h3 id="cityName"></h3>
        <div id="temp"></div>
        <p id="desc"></p>
        <p>Humidity: <span id="humidity"></span>%</p>
    </div>
</div>

<script>
    async function getWeather() {
        const city = document.getElementById('cityInput').value;
        const apiKey = 'YOUR_API_KEY_HERE'; // Ekhane apnar OpenWeatherMap API key boshan
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.cod === 200) {
                document.getElementById('weatherInfo').style.display = 'block';
                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
                document.getElementById('desc').innerText = data.weather[0].description;
                document.getElementById('humidity').innerText = data.main.humidity;
            } else {
                alert("Sohor pawa jayni!");
            }
        } catch (error) {
            console.log("Error fetching data", error);
        }
    }
</script>

</body>
</html>
